<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8" />

  <!-- MOBILE RESPONSIVE -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  />

  <!-- THEME -->
  <meta
    name="theme-color"
    content="#1d7c4d"
  />

  <!-- DESCRIPTION -->
  <meta
    name="description"
    content="De-Home Grocery Store"
  />

  <!-- PREVENT AUTO PHONE LINK -->
  <meta
    name="format-detection"
    content="telephone=no"
  />

  <!-- IOS SUPPORT -->
  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
  />

  <!-- FAVICON -->
  <link
    rel="icon"
    href="%PUBLIC_URL%/favicon.ico"
  />

  <!-- APPLE ICON -->
  <link
    rel="apple-touch-icon"
    href="%PUBLIC_URL%/logo192.png"
  />

  <!-- MANIFEST -->
  <link
    rel="manifest"
    href="%PUBLIC_URL%/manifest.json"
  />

  <!-- TITLE -->
  <title>De-Home Grocery</title>

  <!-- REMOVE HORIZONTAL SCROLL -->
  <style>

    html,
    body,
    #root {
      width: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

  </style>

</head>

<body>

  <noscript>
    You need to enable JavaScript to run this app.
  </noscript>

  <div id="root"></div>

</body>

</html>
